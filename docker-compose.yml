version: '3.8'

services:
  mt5-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt5-bridge
    ports:
      - "8217:5000"  # Host:Container - Change host port if needed
    environment:
      - WINEPREFIX=/home/wineuser/.wine
      - WINEARCH=win64
      - DISPLAY=${DISPLAY:-:0}  # Use host display for GUI installer
      - QT_X11_NO_MITSHM=1
      - WINEDEBUG=-all
      - WINESERVER_TIMEOUT=300
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    volumes:
      - wine_prefix:/home/wineuser/.wine
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  # X11 socket for GUI
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 360s  # 6 minutes for first-time Wine + MT5 setup
    shm_size: '2gb'  # Increased shared memory for Wine
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

volumes:
  wine_prefix:
    # Persists Wine environment and MT5 installation
